name: "CI"
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-nix:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: determinatesystems/nix-installer-action@v22

      - name: Magic Nix Cache
        uses: determinatesystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false

      # devShells.default が正常にビルド（インスタンス化）できるかチェック
      - name: Check devShell (default)
        run: nix develop .#default --command true

      # node更新用のshellも一応チェック
      - name: Check devShell (node)
        run: nix develop .#node --command true
